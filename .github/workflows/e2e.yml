name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build API
        run: pnpm --filter=@toolbox/open-uni-recorder-api build

      - name: Install Playwright browsers
        run: pnpm --filter=@toolbox/open-uni-recorder-web exec playwright install chromium --with-deps

      - name: Run E2E tests
        run: pnpm --filter=@toolbox/open-uni-recorder-web test:e2e
